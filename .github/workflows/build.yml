name: Build

on:
  pull_request:
  workflow_call:

jobs:
  build:
    name: Build (${{ matrix.name || matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          [
            macos-15,
            macos-26,
            macos-26-intel,
          ]
        ccache-variant: [ccache]
        include:
          # CAP_SYS_PTRACE lets lldb debug the e2e fixture as a child process
          # in the container; Docker's default seccomp profile permits ptrace
          # once the cap is held. It is harmless for the plain build/ctest.
          - os: ubuntu-24.04
            name: ubuntu-24.04
            container:
              image: ghcr.io/openimagedebugger/oid:24.04
              options: --cap-add=SYS_PTRACE
            ccache-variant: "ccache"
          - os: ubuntu-26.04
            name: ubuntu-26.04
            container:
              image: ghcr.io/openimagedebugger/oid:26.04
              options: --cap-add=SYS_PTRACE
            ccache-variant: "ccache"
          - os: windows-2025
            ccache-variant: "sccache"
          - os: windows-2025-vs2026
            ccache-variant: "sccache"
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # 7.0.1
        with:
          fetch-depth: 1
          fetch-tags: true
          submodules: "recursive"
          # see https://github.com/orgs/community/discussions/25702#discussioncomment-6313966
          persist-credentials: false

      - if: contains(matrix.os, 'macos')
        name: Select latest stable Xcode
        run: |
          # Exclude beta bundles for determinism and log the resolved version
          # for traceability across the different macOS runners. If no stable
          # Xcode is found (only betas, or the glob matched nothing), keep the
          # runner's default selection instead of calling xcode-select with an
          # empty path, which would fail the job.
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | grep -iv beta | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE"
            echo "Selected Xcode: $LATEST_XCODE"
          else
            echo "No non-beta Xcode found; using default: $(xcode-select -p)"
          fi
          xcodebuild -version

      - name: Setup ${{ matrix.ccache-variant }}
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # 1.2.23
        with:
          verbose: 1
          key: ${{ matrix.name || matrix.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ matrix.name || matrix.os }}-${{ github.ref_name }}
            ${{ matrix.name || matrix.os }}-main
          append-timestamp: true
          variant: ${{ matrix.ccache-variant }}

      # Needed for ninja to work with msvc
      - if: contains(matrix.os, 'windows')
        name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # 1.13.0

      - name: Build
        shell: bash
        env:
          CMAKE_C_COMPILER_LAUNCHER: ${{ matrix.ccache-variant }}
          CMAKE_CXX_COMPILER_LAUNCHER: ${{ matrix.ccache-variant }}
        # see https://stackoverflow.com/a/24470998/5843895 and https://cliutils.gitlab.io/modern-cmake/chapters/intro/running.html
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" -DCMAKE_INSTALL_PREFIX=out -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
          cmake --build build --config Release --target install

      - name: Run Tests
        shell: bash
        working-directory: build
        run: |
          ctest --build-config Release --output-on-failure

      - name: Tar files
        shell: bash
        run: tar --strip-components 1 -cvf build-${{ matrix.name || matrix.os }}.tar out

      - name: Upload build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: build-${{ matrix.name || matrix.os }}
          path: build-${{ matrix.name || matrix.os }}.tar

      # --- MCP agent e2e smoke (non-Windows legs) -------------------------
      # Runs on the same runner, reusing the in-place install produced above
      # rather than a downloaded artifact: liboidbridge's rpaths are absolute
      # paths into out/lib, so a relocated (extracted) install can't resolve
      # liboidipc, and macOS SIP strips DYLD_* from /usr/bin/lldb; building in
      # place puts the libs exactly where the rpaths point. The smoke test
      # compiles a tiny Eigen fixture, launches it under lldb with
      # OID_AGENT=1, imports the deployed oid.py after the breakpoint, and
      # drives the agent endpoint through the real oid-mcp client (discovery
      # -> hello -> list_symbols -> get_buffer), exercising the in-debugger
      # endpoint and the Eigen-under-lldb path end to end. The driver is an
      # lldb + bash script; Windows uses a different debugger and is out of
      # scope for this smoke, so every e2e step is gated off the Windows legs.
      - if: contains(matrix.os, 'ubuntu')
        name: Install lldb (Linux e2e)
        shell: bash
        run: |
          apt-get update -y
          apt-get install -y --no-install-recommends curl lldb

      # Pin uv to a specific version via the official action (verifies the
      # downloaded binary's checksum) rather than piping a remote install
      # script to sh.
      - if: ${{ !contains(matrix.os, 'windows') && !contains(matrix.os, 'intel') }}
        name: Install uv (e2e)
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"

      # Warm the oid-mcp deps up front so the timed e2e (its lldb session is
      # held open with a fixed sleep) does not pay the first-install cost.
      # Skipped on macOS Intel: cryptography (via mcp -> pyjwt[crypto]) ships
      # no x86_64 macOS wheel, and --no-build forbids building it from source,
      # so the Python e2e leg runs only where every locked dep is a wheel.
      - if: ${{ !contains(matrix.os, 'windows') && !contains(matrix.os, 'intel') }}
        name: Warm the oid-mcp virtualenv (e2e)
        shell: bash
        working-directory: resources/oidmcp
        run: |
          uv sync --frozen --no-build --no-install-project
          .venv/bin/python -c "import oidmcp, numpy, PIL"

      # Allow lldb to launch/debug the freshly built fixture without an
      # interactive authorization prompt.
      - if: contains(matrix.os, 'macos') && !contains(matrix.os, 'intel')
        name: Enable developer-mode debugging (macOS e2e)
        run: sudo /usr/sbin/DevToolsSecurity -enable

      - if: ${{ !contains(matrix.os, 'windows') && !contains(matrix.os, 'intel') }}
        name: Run lldb e2e smoke test
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          resources/oidmcp/tests/e2e/run_e2e_lldb.sh "$PWD/out/OpenImageDebugger"
