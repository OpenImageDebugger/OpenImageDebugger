name: Notify downstream

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    # No-ops (skips) until the DOWNSTREAM_REPO repo variable and
    # DOWNSTREAM_DISPATCH_TOKEN secret are configured.
    if: vars.DOWNSTREAM_REPO != ''
    steps:
      - name: Send repository_dispatch
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ vars.DOWNSTREAM_REPO }}/dispatches" \
            -d "{\"event_type\":\"oid-main-push\",\"client_payload\":{\"oid_sha\":\"${GITHUB_SHA}\"}}"
